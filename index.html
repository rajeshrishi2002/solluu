<html>
 <head>
    <title>Solluu</title>
    <link rel="icon" href="logo.png">
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>

   body {
    background: url('fbg1.png');
    background-size: cover;
   }
   .typing-indicator {
    display: flex;
    align-items: center;
   }
   .typing-indicator span {
    display: block;
    width: 8px;
    height: 8px;
    margin: 0 2px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: typing 1.0s infinite;
   }
   .typing-indicator span:nth-child(1) {
    animation-delay: 0s;
   }
   .typing-indicator span:nth-child(2) {
    animation-delay: 0.3s;
   }
   .typing-indicator span:nth-child(3) {
    animation-delay: 0.6s;
   }
   @keyframes typing {
    0%, 60%, 100% {
     opacity: 0;
    }
    30% {
     opacity: 1;
    }
   }
   .no-scrollbar::-webkit-scrollbar {
    display: none;
   }
   .no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
   }
   .message {
    background: linear-gradient(135deg, #e5b7d0 0%, #c45e8c 30%, #c01f72 100%);
    padding: 10px;
    border-radius: 15px;
    color: white;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
   }
   .message.user {
    background: linear-gradient(135deg, #88cef4 0%, #00076b 100%);
   }
  </style>
 </head>
 <body class="text-white h-screen flex flex-col">
  <div class="flex items-center p-0">
   <img alt="Profile picture"  id="profilePic" src="icon.png"  style="margin-top: -25px; width:120px;">
   <div class="ml-4 flex-1">
    
   </div>
   <div class="flex space-x-4">
    
   </div>
  </div>
  <div class="flex flex-col items-center">
    <div class="relative">
        <img alt="Profile picture" class="rounded-full w-20 h-20" id="profilePicLarge" src="dp1.jpeg" style="top: 100px;"/>
        <button id="onlineButton" class="absolute top-0 right-0 bg-green-500 rounded-full w-5 h-5 flex items-center justify-center">
            <span class="text-white text-xs"><img src="online.png" alt=""></span>
        </button>
        
    </div>
    <h2 class="text-xl font-semibold mt-2" id="usernameLarge">
        the_cutie_pie
    </h2>
    
 </div>
 
  <div class="flex flex-col p-4 space-y-4 overflow-y-auto flex-1 no-scrollbar" id="chatContainer">
   <div class="text-center text-gray-400">
 
   </div>
    <div>
 
     
   
     </div>
    </div>
   </div>
    
   </div>
 
 
   </div>
  
   <div class="flex items-start space-x-2">
 
 
    </div>
   </div>
  </div>
  <div class="flex items-center p-3 " style="margin-left: 10px;">
   <input class="flex-1 p-2 rounded-full" id="messageInput" placeholder="Solluu..." type="text" style="color: #c01f72;">
   <div class="flex space-x-4 ml-4">
   </div>
  </div>
  <script>
   let hasSaidGoodbye = false; // Flag to track if "appa vantaanga bye" has been sent

document.getElementById('messageInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        const message = e.target.value.trim(); // Trim whitespace
        const chatContainer = document.getElementById('chatContainer');
        const profilePicSrc = document.getElementById('profilePic').src;

        // Append user's message
        const userMessageDiv = document.createElement('div');
        userMessageDiv.classList.add('flex', 'justify-end');
        userMessageDiv.innerHTML = `<div class="message user max-w-xs"><p>${message}</p></div>`;
        chatContainer.appendChild(userMessageDiv);

        // Scroll to the bottom
        chatContainer.scrollTop = chatContainer.scrollHeight;

        // Check for specific messages and respond accordingly
        let botReply = '';
        const lowerCaseMessage = message.toLowerCase(); // Convert message to lowercase for easier comparison

        // If the bot has already said goodbye, skip further replies
        if (hasSaidGoodbye) {
            return; // Exit the function if goodbye has been said
        }

        // Adding responses for specific keywords
        if (lowerCaseMessage === 'hi') {
            botReply = 'Hello🙋🏻‍♀️';
        } else if (lowerCaseMessage === 'bye') {
            botReply = 'Byee👋';
        } else if (lowerCaseMessage === 'okay') {
            botReply = 'Ok😊';
        } else if (lowerCaseMessage === 'name') {
            botReply = 'en peru Rejina';
        } else {
            // Array of random responses, including the special response
            const randomResponses = ["apparam solren", "seri", "oh", "okay", "appa vantaanga bye","Mmm", "appa vantaanga bye","Mmm", "appa vantaanga bye", ];
            // Select a random response
            botReply = randomResponses[Math.floor(Math.random() * randomResponses.length)];

            // If the random reply is "appa vantaanga bye", set the flag
            if (botReply === "appa vantaanga bye") {
                hasSaidGoodbye = true; // Set the flag to true
                document.getElementById('onlineButton').style.display = 'none'; // Hide the online button
            }
        }

        const typingDiv = document.createElement('div');
        typingDiv.classList.add('flex', 'items-start', 'space-x-2');
        typingDiv.innerHTML = `
            <img alt="Profile picture" class="rounded-full w-10 h-10" height="40" src="dp1.jpeg" width="40"/>
            <div class="message max-w-xs">
                <p>Typing</p>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>`;
        chatContainer.appendChild(typingDiv);

        // Scroll to the bottom
        chatContainer.scrollTop = chatContainer.scrollHeight;

        setTimeout(() => {
            chatContainer.removeChild(typingDiv);
            const botMessageDiv = document.createElement('div');
            botMessageDiv.classList.add('flex', 'items-start', 'space-x-2');
            botMessageDiv.innerHTML = `
                <img alt="Profile picture" class="rounded-full w-10 h-10" height="40" src="dp1.jpeg" width="40"/>
                <div class="message max-w-xs">
                    <p>${botReply}</p>
                </div>`;
            chatContainer.appendChild(botMessageDiv);

            // Scroll to the bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 3000);

        // Clear the input
        e.target.value = '';
    }
});
document.getElementById('messageInput').addEventListener('input', function (e) {
    const maxLength = 45;
    if (e.target.value.length > maxLength) {
        alert(`Ivalo perusalaam type pannatha`);
        e.target.value = e.target.value.substring(0, maxLength); // Trim the input to max length
    }
});
document.getElementById('messageInput').addEventListener('input', function (e) {
            const maxLength = 45;
            const inputValue = e.target.value;

            if (inputValue.length > maxLength) {
                alert(`Input cannot exceed ${maxLength} characters.`);
                e.target.value = inputValue.substring(0, maxLength); // Trim the input to max length
            }
        });

  </script>
 </body>
</html>
